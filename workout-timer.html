<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }

  /* LIST VIEW — all fonts scale with viewport via clamp(phone, preferred, tv) */
  .list-view { padding: 28px; max-width: 900px; margin: 0 auto; }
  .list-view h1 { font-size: clamp(22px, 2.5vw, 48px); font-weight: 700; color: #fff; margin-bottom: 4px; }
  .list-view .sub { font-size: clamp(13px, 1.5vw, 28px); color: #555; margin-bottom: 8px; }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .progress-bar { width: 160px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #fff; border-radius: 4px; transition: width 0.4s; }

  .section-label { font-size: clamp(11px, 1.2vw, 22px); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; margin: 20px 0 10px; padding-left: 4px; }

  .exercise-card { display: flex; align-items: center; gap: 16px; background: #1a1a1a; border-radius: 14px; padding: 16px 20px; border: 1px solid #2a2a2a; margin-bottom: 10px; transition: all 0.3s; }
  /* Superset visual grouping */
  .exercise-card.ss-top { border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; border-bottom: 1px dashed #4a6aff; }
  .exercise-card.ss-mid { border-radius: 0; margin-bottom: 0; border-bottom: 1px dashed #4a6aff; border-top: none; }
  .exercise-card.ss-bot { border-top-left-radius: 0; border-top-right-radius: 0; border-top: none; }
  .exercise-card.ss-top, .exercise-card.ss-mid, .exercise-card.ss-bot { border-color: #3a4a6a; }
  .ss-label { font-size: clamp(9px, 1vw, 16px); color: #4a6aff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; padding-left: 52px; }
  .ss-breadcrumb { display: flex; flex-wrap: wrap; gap: clamp(4px, 1vw, 10px); align-items: center; justify-content: center; margin-top: 24px; width: 100%; padding: 0 12px; box-sizing: border-box; }
  .ss-breadcrumb span { font-size: clamp(14px, 3.2vw, 26px); transition: color 0.3s; white-space: nowrap; }
  .ss-breadcrumb .ss-arrow { font-size: clamp(12px, 2.5vw, 22px); }
  .exercise-card.done { background: #0d1a0d; border-color: #2a4a2a; opacity: 0.7; }
  .exercise-card.optional { border-style: dashed; border-color: #333; }
  .exercise-card.optional .exercise-name { color: #aaa; }

  .tick-box { width: 36px; height: 36px; border-radius: 10px; border: 2px solid #444; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: clamp(18px, 2vw, 36px); color: transparent; }
  .tick-box.checked { border-color: #4aff7a; background: rgba(74,255,122,0.13); color: #4aff7a; }

  .exercise-info { flex: 1; }
  .exercise-name { font-weight: 700; font-size: clamp(16px, 1.8vw, 34px); color: #fff; }
  .exercise-card.done .exercise-name { color: #6a6; text-decoration: line-through; }
  .exercise-detail { font-size: clamp(12px, 1.4vw, 26px); color: #888; margin-top: 3px; }
  .optional-tag { display: inline-block; font-size: clamp(9px, 1vw, 18px); padding: 2px 7px; border-radius: 5px; background: #2a2a1e; color: #aa9944; margin-left: 8px; vertical-align: middle; }

  .btn-start { background: #4a6aff; color: #fff; border: none; border-radius: 12px; padding: 12px 24px; cursor: pointer; font-weight: 700; font-size: clamp(14px, 1.6vw, 30px); flex-shrink: 0; }
  .exercise-card.done .btn-start { background: #333; }
  .exercise-card.optional .btn-start { background: #3a3a3a; }
  .btn-remove { background: none; border: none; color: #444; cursor: pointer; font-size: clamp(20px, 2.2vw, 40px); padding: 4px 8px; }

  /* ADD EXERCISE MODAL */
  .btn-open-add { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; border-radius: 14px; padding: 16px; cursor: pointer; font-size: clamp(14px, 1.6vw, 30px); font-weight: 600; width: 100%; margin-top: 16px; text-align: center; }
  .btn-open-add:hover { background: #222; color: #ccc; }
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #1a1a1a; border-radius: 20px; padding: clamp(20px, 3vw, 40px); border: 1px solid #333; width: 100%; max-width: 480px; }
  .modal h3 { font-size: clamp(18px, 2vw, 36px); color: #fff; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: clamp(12px, 1.3vw, 22px); color: #888; margin-bottom: 6px; font-weight: 600; }
  .modal-field input { width: 100%; background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: clamp(15px, 1.6vw, 28px); }
  .modal-row { display: flex; gap: 10px; }
  .modal-row .modal-field { flex: 1; }
  .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
  .modal-buttons button { flex: 1; border: none; border-radius: 12px; padding: 14px; cursor: pointer; font-size: clamp(14px, 1.5vw, 26px); font-weight: 700; }
  .btn-modal-add { background: #4a6aff; color: #fff; }
  .btn-modal-cancel { background: #333; color: #ccc; }
  .modal-field select { width: 100%; background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: clamp(15px, 1.6vw, 28px); appearance: none; -webkit-appearance: none; }
  .weight-group { display: flex; gap: 8px; }
  .weight-group .modal-field:first-child { flex: 1; }
  .weight-group .modal-field:last-child { flex: 0 0 auto; min-width: 90px; }

  .save-bar { display: flex; gap: 10px; align-items: center; margin-top: 20px; padding: 12px 16px; background: #111; border-radius: 10px; border: 1px solid #222; }
  .save-bar .status { font-size: clamp(11px, 1.2vw, 22px); color: #555; flex: 1; }
  .save-bar button { background: #333; color: #ccc; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: clamp(12px, 1.3vw, 24px); font-weight: 600; }
  .save-bar button:hover { background: #444; }

  /* TIMER VIEW — larger scale range for visibility at distance */
  .timer-view { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; position: relative; }
  .btn-back { position: absolute; top: 20px; left: 20px; background: #222; color: #888; border: none; border-radius: 12px; padding: 10px 20px; cursor: pointer; font-size: clamp(20px, 2.5vw, 48px); font-weight: 600; z-index: 10; }
  .tap-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #333; font-size: clamp(12px, 2vw, 20px); font-weight: 500; text-align: center; pointer-events: none; z-index: 5; }
  .timer-exercise-name { font-size: clamp(28px, 7vw, 64px); color: #fff; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .timer-exercise-detail { font-size: clamp(22px, 5.5vw, 52px); color: #fff; font-weight: 700; margin-bottom: 36px; text-align: center; }
  .timer-clock { font-size: clamp(100px, 28vw, 280px); font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 12px; transition: color 0.3s; }
  .timer-phase { font-size: clamp(28px, 7vw, 64px); font-weight: 700; text-transform: uppercase; letter-spacing: 6px; opacity: 0.7; margin-bottom: 24px; }
  .timer-meta { display: flex; gap: 28px; font-size: clamp(22px, 5.5vw, 52px); color: #888; margin-bottom: 28px; }
  .timer-meta .set-num { color: #fff; font-weight: 700; font-size: clamp(26px, 6vw, 58px); }
  .timer-progress { display: flex; flex-wrap: wrap; gap: clamp(4px, 0.5vw, 10px); width: 80%; max-width: 700px; margin-bottom: 40px; justify-content: center; }
  .timer-progress .set-block { flex: 1 1 0; min-width: 0; height: clamp(10px, 1.2vw, 20px); border-radius: 4px; background: #333; transition: background 0.3s; }
  .timer-progress .set-block.done { background: #fff; }
  .timer-progress .set-block.active-work { background: #ff6a4a; }
  .timer-progress .set-block.active-rest { background: #4ac4c4; }
  .timer-progress .set-block.active-paused { background: #ffaa00; }
  .timer-progress .set-block.active-countdown { background: #ffaa00; }
  /* SCREEN BORDER TIMER */
  .border-timer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
  .border-timer svg { width: 100%; height: 100%; }
  .border-timer .border-track { fill: none; stroke: #000; stroke-linejoin: round; }
  .border-timer .border-fill { fill: none; transition: stroke-dashoffset 0.8s linear; stroke-linecap: round; stroke-linejoin: round; }

  /* DRAG REORDER */
  .exercise-card { position: relative; }
  .exercise-card.dragging { opacity: 0.3; }
  .exercise-card.drag-over-above { border-top: 3px solid #4a6aff; margin-top: -3px; }
  .exercise-card.drag-over-below { border-bottom: 3px solid #4a6aff; margin-bottom: -3px; }

  /* DRAG HANDLE */
  .drag-handle { flex-shrink: 0; color: #333; font-size: clamp(18px, 2vw, 32px); cursor: grab; padding: 8px 4px; touch-action: none; user-select: none; -webkit-user-select: none; }
  .drag-handle:active { cursor: grabbing; color: #666; }

  .timer-controls { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .timer-controls button { border: none; border-radius: 14px; padding: 16px 36px; cursor: pointer; font-size: clamp(22px, 5.5vw, 52px); font-weight: 600; }
  .btn-pause { background: #333; color: #fff; }
  .btn-resume { background: #ffaa00; color: #000; font-weight: 700; }
  .btn-skip { background: #222; color: #888; }
  .btn-done-btn { background: #4aff7a; color: #000; font-weight: 700; }

  .color-work { color: #ff6a4a; }
  .color-rest { color: #4ac4c4; }
  .color-done { color: #4aff7a; }
  .color-paused { color: #ffaa00; }
  .color-countdown { color: #ffaa00; }
  .bg-work { background: #ff6a4a; }
  .bg-rest { background: #4ac4c4; }
  .bg-done { background: #4aff7a; }
  .bg-paused { background: #ffaa00; }
  .bg-countdown { background: #ffaa00; }

  /* LANDSCAPE — auto-detected via screen orientation */
  .timer-left, .timer-right { display: contents; }

  @media (orientation: landscape) {
    .timer-view { flex-direction: row; flex-wrap: wrap; gap: 4vw; padding: 2vh 4vw; }
    .timer-left { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
    .timer-right { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
    .timer-exercise-name { font-size: clamp(28px, 6vh, 80px); }
    .timer-exercise-detail { font-size: clamp(22px, 5vh, 64px); margin-bottom: 3vh; }
    .timer-clock { font-size: clamp(120px, 30vh, 400px); margin-bottom: 1vh; }
    .timer-phase { font-size: clamp(28px, 5vh, 72px); margin-bottom: 2vh; }
    .timer-meta { font-size: clamp(22px, 4vh, 56px); margin-bottom: 2vh; }
    .timer-meta .set-num { font-size: clamp(26px, 4.5vh, 64px); }
    .timer-progress { width: 90%; max-width: none; margin-bottom: 3vh; }
    .timer-progress .set-block { height: clamp(12px, 2vh, 28px); }
    .timer-controls button { font-size: clamp(22px, 4vh, 56px); padding: 2vh 4vw; }
    .btn-back { top: 1.5vh; left: 1.5vw; font-size: clamp(18px, 3vh, 44px); }
    .ss-breadcrumb { flex-basis: 100%; margin-top: 0; gap: clamp(8px, 1.5vw, 18px); justify-content: center; }
    .ss-breadcrumb span { font-size: clamp(28px, 5vh, 60px); }
    .ss-breadcrumb .ss-arrow { font-size: clamp(24px, 4vh, 50px); }
  }

  @media (max-width: 600px) {
    .list-view { padding: 16px; }
    .exercise-card { padding: 12px 14px; gap: 10px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── DATA (embedded by generator) ──
let exercises = [];

const EXERCISES_DATA = [];

// ── SOURCE TRACKING ──
// Each source (embedded vs each unique hash) gets its own localStorage key
let sourceData = EXERCISES_DATA;  // original exercises for this source (for Reset All)
let saveKey = "wt-embedded";      // localStorage key scoped to source

// ── WORKOUT METADATA ──
// Parsed from @-prefixed first segment in V2 URLs: @ref[,athlete]
let workoutMeta = { ref: null, athlete: null };

function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h).toString(36);
}

function parseV2(text) {
  // V2: compact format — [@metadata;]name,weight,sets,reps,work,rest[,flags];...
  const segments = text.split(";").filter(Boolean);
  if (segments.length && segments[0].startsWith("@")) {
    const metaFields = segments.shift().slice(1).split(",");
    if (metaFields[0]) workoutMeta.ref = metaFields[0];
    if (metaFields[1]) workoutMeta.athlete = metaFields[1];
  }
  return segments.map(seg => {
    const f = seg.split(",");
    const ex = { name: f[0], weight: f[1], sets: +f[2], reps: +f[3], work: +f[4], rest: +f[5] };
    const flags = f[6] || "";
    if (flags.includes("o")) ex.optional = true;
    if (flags.includes("s")) ex.linkedToNext = true;
    return ex;
  });
}

function loadExercises() {
  let data = EXERCISES_DATA;
  let fingerprint = "";
  // Load from URL hash fragment
  try {
    const raw = window.location.hash.slice(1);
    if (raw) {
      let text, decoded;
      // Try plaintext first: percent-encoded V2 (starts with @ or %40 after decode)
      try {
        const plain = decodeURIComponent(raw);
        if (plain.startsWith("@") || plain.startsWith("[")) {
          text = plain;
        }
      } catch (_) {}
      // Fall back to base64url decode
      if (!text) {
        const encoded = raw.replace(/-/g, "+").replace(/_/g, "/") + "==".slice(0, (4 - raw.length % 4) % 4);
        text = atob(encoded);
      }
      if (text.startsWith("[")) {
        // V1: JSON array format
        decoded = JSON.parse(text);
      } else {
        // V2: compact format
        decoded = parseV2(text);
      }
      if (Array.isArray(decoded) && decoded.length) {
        data = decoded;
        fingerprint = text;
        saveKey = "wt-" + hashCode(text);
      }
    }
  } catch (e) {}
  sourceData = data;
  exercises = data.map(e => ({ ...e, done: false, linkedToNext: e.linkedToNext || false }));
  loadState();
  render();
}

// ── STATE ──
let state = {
  view: "list",
  exIdx: null,
  set: 1,
  phase: "idle",
  pausedFrom: "work",
  time: 0,
  // Superset tracking
  ssGroup: [],     // all exercise indices in the superset
  ssActive: [],    // currently active (not yet finished) exercise indices
  ssPos: 0,        // position within ssActive for current round
  ssRound: 1,      // current round number (for display)
  ssSetsLeft: {},  // { exIdx: setsRemaining } — per-exercise countdown
};

let timerInterval = null;
// ── PERSISTENCE ──
function saveState() {
  try {
    const data = {
      exercises: exercises.map(e => ({
        name: e.name, done: e.done, weight: e.weight,
        sets: e.sets, reps: e.reps, work: e.work, rest: e.rest,
        optional: e.optional, linkedToNext: e.linkedToNext || false,
        notes: e.notes || "",
      })),
      savedAt: new Date().toISOString(),
    };
    localStorage.setItem(saveKey, JSON.stringify(data));
  } catch (e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(saveKey);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.exercises && data.exercises.length) {
      // Validate: discard cache if any exercise has NaN fields (stale bad parse)
      const valid = data.exercises.every(e =>
        e.name && !isNaN(e.sets) && !isNaN(e.reps) && !isNaN(e.work) && !isNaN(e.rest));
      if (!valid) { localStorage.removeItem(saveKey); return null; }
      // Replace entire list — preserves adds, deletes, reorder, done flags
      exercises = data.exercises.map(e => ({ ...e }));
    }
    return data.savedAt;
  } catch (e) { return null; }
}

function clearSavedState() {
  try { localStorage.removeItem(saveKey); } catch (e) {}
  // Revert to this source's original exercises
  exercises = sourceData.map(e => ({ ...e, done: false, linkedToNext: e.linkedToNext || false }));
  render();
}

function exportResults() {
  const main = exercises.filter(e => !e.optional);
  const opt = exercises.filter(e => e.optional);
  const header = [];
  if (workoutMeta.ref) header.push(`ref:${workoutMeta.ref}`);
  if (workoutMeta.athlete) header.push(`athlete:${workoutMeta.athlete}`);
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  header.push(`completed:${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`);
  const lines = [...header];
  main.forEach(e => {
    const mark = e.done ? "✅" : "⏭️";
    lines.push(`${mark} ${e.name} | ${e.weight} × ${e.sets} × ${e.reps} | ${e.work}s+${e.rest}s`);
  });
  opt.forEach(e => {
    if (e.done) lines.push(`✅ ${e.name} | ${e.weight} × ${e.sets} × ${e.reps} | ${e.work}s+${e.rest}s [backfill]`);
  });
  const txt = lines.join("\n");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById("export-btn");
      if (btn) { btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = "Export"; }, 2000); }
    }).catch(() => fallbackCopy(txt));
  } else {
    fallbackCopy(txt);
  }
  return txt;
}

function sendToShortcut() {
  const txt = exportResults();
  window.location.href = "shortcuts://run-shortcut?name=Send%20Timer%20Info%20On&input=" + encodeURIComponent(txt);
}

function fallbackCopy(txt) {
  const ta = document.createElement("textarea");
  ta.value = txt;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  const btn = document.getElementById("export-btn");
  if (btn) { btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = "Export"; }, 2000); }
}

// ── AUDIO ──
const BEEPS = [
  { f: 880, d: 150 },   // 0: work start
  { f: 440, d: 300 },   // 1: rest start
  { f: 660, d: 100 },   // 2: 3-2-1 countdown
  { f: 1200, d: 400 },  // 3: exercise done
  { f: 330, d: 500 },   // 4: 10-second warning (low double-beep)
];

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}
// Proactively resume AudioContext when returning to the page (e.g. after podcast)
document.addEventListener("visibilitychange", function() {
  if (!document.hidden && audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
});
// Unlock audio + speech on first user tap (required for Safari/iOS)
function unlockAudio() {
  getAudioCtx();
}
function unlockSpeech() {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    window.speechSynthesis.speak(u);
  }
}
document.addEventListener("touchstart", function unlock() {
  unlockAudio();
  unlockSpeech();
}, { once: true });
document.addEventListener("click", function unlock() {
  unlockAudio();
  unlockSpeech();
}, { once: true });

// iOS Safari speechSynthesis keepalive — prevents silent stall after ~14s
setInterval(function() {
  if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }
}, 10000);

// ── VOICE ANNOUNCEMENTS ──
function speak(text) {
  try {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.1;
      u.volume = 0.8;
      window.speechSynthesis.speak(u);
    }
  } catch (e) {}
}

// ── FULLSCREEN ──
function enterFullscreen() {
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch (e) {}
}
function exitFullscreen() {
  try {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  } catch (e) {}
}

function beep(type) {
  try {
    const ctx = getAudioCtx();
    const doBeep = () => {
      const b = BEEPS[type];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = b.f;
      gain.gain.value = 0.3;
      osc.start();
      osc.stop(ctx.currentTime + b.d / 1000);
      // Double-beep for 10-second warning
      if (type === 4) {
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = b.f;
        gain2.gain.value = 0.3;
        osc2.start(ctx.currentTime + 0.25);
        osc2.stop(ctx.currentTime + 0.25 + b.d / 1000);
      }
    };
    if (ctx.state === "suspended") {
      ctx.resume().then(doBeep);
    } else {
      doBeep();
    }
  } catch (e) {}
}

// ── SUPERSET HELPERS ──
// Get the full superset group starting from any member
function getSupersetGroup(idx) {
  // Walk backward to find the start of the chain
  let start = idx;
  while (start > 0 && exercises[start - 1] && exercises[start - 1].linkedToNext) start--;
  // Walk forward to collect all members
  const group = [start];
  let cur = start;
  while (cur < exercises.length && exercises[cur].linkedToNext) {
    cur++;
    if (cur < exercises.length) group.push(cur);
  }
  return group;
}

function isInSuperset(idx) {
  return getSupersetGroup(idx).length > 1;
}

// Rest between rounds = max rest of all currently active exercises
// 20 distinct exercise colors (avoids #ff6a4a, #4ac4c4, #ffaa00, #4aff7a, #4a6aff, #fff, #333)
const ssColors = [
  "#ff6a4a", "#e06cf0", "#c8e64a", "#ff5eaa", "#b48aff",
  "#f5a623", "#58d68d", "#ff8c42", "#c490ff", "#f0e040",
  "#ff6b9d", "#22e0a0", "#ffd166", "#ff7eb3", "#a0d911",
  "#d4a5ff", "#ffa07a", "#d94f9e", "#bae637", "#ff9a76"
];
function ssExColor(groupPos) { return ssColors[groupPos % ssColors.length]; }

function ssActiveRest() {
  return Math.max(0, ...state.ssActive.map(idx => exercises[idx].rest));
}

// ── HELPERS ──
function fmtTime(s) {
  if (s <= 60) return String(s);
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}

function estTime(e) {
  return e.work * e.sets + e.rest * (e.sets - 1);
}

function estSupersetTime(group) {
  // Simulate the superset timer to get exact time
  const setsLeft = {};
  let active = [...group];
  group.forEach(idx => { setsLeft[idx] = exercises[idx].sets; });
  let total = 0;
  while (active.length > 0) {
    // Work phase: each active exercise does work + 5s buffer between them
    active.forEach((idx, i) => { total += exercises[idx].work + (i > 0 ? 5 : 0); });
    // Decrement sets
    active.forEach(idx => { setsLeft[idx]--; });
    active = active.filter(idx => setsLeft[idx] > 0);
    // Rest (max of remaining active exercises)
    if (active.length > 0) {
      total += Math.max(0, ...active.map(idx => exercises[idx].rest));
    }
  }
  return total;
}

function estWorkoutTime() {
  let total = 0;
  const visited = new Set();
  for (let i = 0; i < exercises.length; i++) {
    if (visited.has(i) || exercises[i].done || exercises[i].optional) continue;
    const group = getSupersetGroup(i);
    group.forEach(idx => visited.add(idx));
    const activeGroup = group.filter(idx => !exercises[idx].done);
    if (activeGroup.length === 0) continue;
    if (activeGroup.length === 1) {
      total += estTime(exercises[activeGroup[0]]);
    } else {
      total += estSupersetTime(activeGroup);
    }
  }
  return total;
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function totalRemaining() {
  const inSuperset = state.ssGroup.length > 1;

  if (!inSuperset) {
    const ex = exercises[state.exIdx];
    if (!ex) return 0;
    // During work on set S of N: current time + rest after this set + remaining (N-S) sets of (work+rest) - final rest
    if (state.phase === "work") {
      const setsAfter = ex.sets - state.set; // sets remaining after current
      return state.time + (setsAfter > 0 ? ex.rest : 0) + setsAfter * ex.work + Math.max(0, setsAfter - 1) * ex.rest;
    }
    // During rest after set S of N: current time + remaining (N-S) sets of work + (N-S-1) rests between them
    if (state.phase === "rest") {
      const setsAfter = ex.sets - state.set; // sets remaining after current
      return state.time + setsAfter * ex.work + Math.max(0, setsAfter - 1) * ex.rest;
    }
    if (state.phase === "countdown") return ex.work * ex.sets + ex.rest * (ex.sets - 1);
    return 0;
  }

  // Superset: simulate remaining time exactly
  let rem = state.time; // current phase time remaining

  // Clone state for simulation
  const simSets = { ...state.ssSetsLeft };
  let simActive = [...state.ssActive];
  let simPos = state.ssPos;
  let simPhase = state.phase;

  // Walk through the remaining phases step by step
  while (true) {
    if (simPhase === "countdown") {
      // After countdown, first exercise work starts
      simPhase = "work";
      simPos = 0;
      rem += exercises[simActive[0]].work;
    } else if (simPhase === "buffer") {
      // Buffer done, start work
      simPhase = "work";
      rem += exercises[simActive[simPos]].work;
    } else if (simPhase === "work") {
      if (simPos < simActive.length - 1) {
        // 5s buffer before next exercise
        simPos++;
        rem += 5;
        simPhase = "buffer";
      } else {
        // End of round — decrement sets
        simActive.forEach(idx => { simSets[idx]--; });
        simActive = simActive.filter(idx => simSets[idx] > 0);
        if (simActive.length === 0) break; // all done
        const restTime = Math.max(0, ...simActive.map(idx => exercises[idx].rest));
        if (restTime > 0) {
          rem += restTime;
          simPhase = "rest";
        } else {
          // No rest, start next round
          simPos = 0;
          rem += exercises[simActive[0]].work;
        }
      }
    } else if (simPhase === "rest") {
      // After rest, start next round
      simPos = 0;
      simPhase = "work";
      rem += exercises[simActive[0]].work;
    } else {
      break;
    }
  }

  return Math.max(0, rem);
}

// ── TICK ──
function tick() {
  if (state.time <= 1) {
    clearTimerInterval();
    state.time = 0;
    onTimerZero();
  } else {
    if (state.time === 11 && state.phase === "rest") beep(4);
    if (state.time === 4) beep(2);
    if (state.time === 3) beep(2);
    if (state.time === 2) beep(2);
    state.time--;
  }
  render();
}

function startInterval() {
  clearTimerInterval();
  timerInterval = setInterval(tick, 1000);
}

function onTimerZero() {
  const ex = exercises[state.exIdx];
  const inSuperset = state.ssGroup.length > 1;

  if (state.phase === "countdown") {
    state.phase = "work";
    state.time = ex.work;
    beep(0);
    speak(ex.name + ", Set 1");
    startInterval();
    return;
  }

  // Solo exercise (not a superset)
  if (!inSuperset) {
    if (state.phase === "work") {
      if (state.set >= ex.sets) {
        state.phase = "done"; beep(3);
        speak(ex.name + " complete");
        exercises[state.exIdx].done = true; saveState();
      } else if (ex.rest === 0) {
        state.set++; state.phase = "work"; state.time = ex.work; beep(0);
        speak("Set " + state.set);
        startInterval();
      } else {
        state.phase = "rest"; state.time = ex.rest; beep(1); speak("Rest"); startInterval();
      }
    } else if (state.phase === "rest") {
      state.set++; state.phase = "work"; state.time = ex.work; beep(0);
      speak(ex.name + ", Set " + state.set);
      startInterval();
    }
    return;
  }

  // ── SUPERSET LOGIC ──
  if (state.phase === "work") {
    // Is there another active exercise to do in this round?
    if (state.ssPos < state.ssActive.length - 1) {
      // 5-second buffer before next exercise
      state.phase = "buffer";
      state.ssPos++;
      state.exIdx = state.ssActive[state.ssPos];
      state.time = 5;
      beep(2);
      speak("Next, " + exercises[state.exIdx].name);
      startInterval();
    } else {
      // End of round — decrement sets for all active exercises
      state.ssActive.forEach(idx => { state.ssSetsLeft[idx]--; });
      // Remove exercises that are now done
      const finished = state.ssActive.filter(idx => state.ssSetsLeft[idx] <= 0);
      finished.forEach(idx => { exercises[idx].done = true; });
      state.ssActive = state.ssActive.filter(idx => state.ssSetsLeft[idx] > 0);

      if (state.ssActive.length === 0) {
        // All exercises complete
        state.phase = "done"; beep(3); speak("Superset complete"); saveState();
      } else {
        const restTime = ssActiveRest();
        if (restTime === 0) {
          // No rest — straight to next round
          state.ssRound++;
          state.ssPos = 0;
          state.exIdx = state.ssActive[0];
          state.time = exercises[state.exIdx].work;
          beep(0); speak("Round " + state.ssRound + ", " + exercises[state.exIdx].name); startInterval();
        } else {
          state.phase = "rest"; state.time = restTime; beep(1); speak("Rest"); startInterval();
        }
      }
      if (finished.length) saveState();
    }
  } else if (state.phase === "buffer") {
    // Buffer done — start this exercise's work
    state.phase = "work";
    state.time = exercises[state.exIdx].work;
    beep(0); speak(exercises[state.exIdx].name); startInterval();
  } else if (state.phase === "rest") {
    // Start next round
    state.ssRound++;
    state.ssPos = 0;
    state.exIdx = state.ssActive[0];
    state.phase = "work";
    state.time = exercises[state.exIdx].work;
    beep(0); speak("Round " + state.ssRound + ", " + exercises[state.exIdx].name); startInterval();
  }
}

// ── ACTIONS ──
function startExercise(i) {
  const group = getSupersetGroup(i);
  // Reset done flags for all exercises in the group (handles Redo)
  group.forEach(idx => { exercises[idx].done = false; });
  saveState();
  state.view = "timer";
  state.exIdx = group[0];
  state.ssGroup = group;
  state.ssActive = [...group];
  state.ssPos = 0;
  state.ssRound = 1;
  state.ssSetsLeft = {};
  group.forEach(idx => { state.ssSetsLeft[idx] = exercises[idx].sets; });
  state.set = 1; // still used for solo exercises
  state.phase = "countdown";
  state.time = 5;
  requestWakeLock();
  enterFullscreen();
  startInterval();
  render();
}

function pause() {
  clearTimerInterval();
  state.pausedFrom = state.phase;
  state.phase = "paused";
  render();
}

function resume() {
  state.phase = state.pausedFrom;
  startInterval();
  render();
}

function skip() {
  clearTimerInterval();
  if (state.phase === "paused") state.phase = state.pausedFrom;
  state.time = 0;
  onTimerZero();
  render();
}

function onTimerTap(e) {
  // Don't trigger on button clicks
  if (e.target.closest('button')) return;
  if (state.phase === "paused") { resume(); }
  else if (["work", "rest", "buffer"].includes(state.phase)) { pause(); }
}

function backToList() {
  clearTimerInterval();
  releaseWakeLock();
  exitFullscreen();
  state.view = "list";
  state.phase = "idle";
  state.ssGroup = [];
  state.ssActive = [];
  state.ssPos = 0;
  state.ssRound = 1;
  state.ssSetsLeft = {};
  render();
}

function toggleDone(i) {
  exercises[i].done = !exercises[i].done;
  saveState();
  render();
}

function removeExercise(i) {
  exercises.splice(i, 1);
  saveState();
  render();
}

function saveExercise() {
  const name = document.getElementById("add-name").value.trim();
  if (!name) return alert("Name is required");
  const unit = document.getElementById("add-unit").value;
  const num = document.getElementById("add-weight").value;
  if (unit !== "BW" && !num) return alert("Weight is required for " + unit);
  const weight = unit === "BW" ? "BW" : (num + unit);
  const sets = Math.min(20, Math.max(1, parseInt(document.getElementById("add-sets").value) || 5));
  const work = Math.max(1, parseInt(document.getElementById("add-work").value) || 30);
  const rest = Math.max(0, parseInt(document.getElementById("add-rest").value) ?? 0);
  const linked = document.getElementById("add-linked").checked;
  const data = {
    name,
    weight,
    sets,
    reps: parseInt(document.getElementById("add-reps").value) || 10,
    work,
    rest,
    linkedToNext: linked,
    notes: (document.getElementById("add-notes").value || "").trim(),
  };
  if (editIdx !== null) {
    // Edit existing — preserve done state
    Object.assign(exercises[editIdx], data);
  } else {
    // Add new
    exercises.push({ ...data, done: false, optional: false });
  }
  saveState();
  closeModal();
}

// ── DRAG REORDER ──
let dragIdx = null;
let dragY = 0;
let dragCard = null;
let dragCards = [];
let dragScrollFrame = null;

function getDragCards() {
  return Array.from(document.querySelectorAll(".exercise-card[data-idx]"));
}

function getDropTarget(y) {
  for (const c of dragCards) {
    const idx = parseInt(c.dataset.idx);
    if (idx === dragIdx) continue;
    const r = c.getBoundingClientRect();
    const mid = r.top + r.height / 2;
    if (y < mid) return { idx, pos: "above" };
  }
  // Below all cards
  const lastIdx = dragCards.length ? parseInt(dragCards[dragCards.length - 1].dataset.idx) : null;
  return lastIdx !== null && lastIdx !== dragIdx ? { idx: lastIdx, pos: "below" } : null;
}

function clearDragHighlights() {
  document.querySelectorAll(".exercise-card").forEach(c =>
    c.classList.remove("dragging", "drag-over-above", "drag-over-below"));
}

// Desktop HTML5 drag
function onDragStart(e, i) {
  dragIdx = i;
  dragCards = getDragCards();
  e.dataTransfer.effectAllowed = "move";
  e.target.closest(".exercise-card").classList.add("dragging");
}
function onDragEnd(e) { dragIdx = null; clearDragHighlights(); }
function onDragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  clearDragHighlights();
  if (dragIdx === null) return;
  document.querySelector(`.exercise-card[data-idx="${dragIdx}"]`)?.classList.add("dragging");
  const target = getDropTarget(e.clientY);
  if (target) {
    const card = document.querySelector(`.exercise-card[data-idx="${target.idx}"]`);
    if (card) card.classList.add(target.pos === "above" ? "drag-over-above" : "drag-over-below");
  }
}
function onDrop(e, i) {
  e.preventDefault();
  if (dragIdx === null) return;
  const target = getDropTarget(e.clientY);
  if (!target) { dragIdx = null; clearDragHighlights(); return; }
  let toIdx = target.idx;
  if (target.pos === "below") toIdx++;
  if (toIdx > dragIdx) toIdx--;
  if (toIdx !== dragIdx) {
    const moved = exercises.splice(dragIdx, 1)[0];
    exercises.splice(toIdx, 0, moved);
    saveState();
  }
  dragIdx = null;
  clearDragHighlights();
  render();
}

// Touch drag (Safari / iOS) — uses transform for smooth 60fps movement
function onTouchDragStart(e, i) {
  e.preventDefault();
  dragIdx = i;
  dragCards = getDragCards();
  dragCard = e.target.closest(".exercise-card");
  dragY = e.touches[0].clientY;
  dragCard.classList.add("dragging");
  dragCard.style.position = "relative";
  dragCard.style.zIndex = "100";
  document.body.style.overflow = "hidden";
}

function onTouchDragMove(e) {
  if (dragIdx === null || !dragCard) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const dy = y - dragY;
  dragCard.style.transform = `translateY(${dy}px)`;
  dragCard.style.opacity = "0.85";

  // Highlight drop target
  clearDragHighlights();
  dragCard.classList.add("dragging");
  const target = getDropTarget(y);
  if (target) {
    const card = document.querySelector(`.exercise-card[data-idx="${target.idx}"]`);
    if (card) card.classList.add(target.pos === "above" ? "drag-over-above" : "drag-over-below");
  }

  // Auto-scroll near edges
  const margin = 60;
  const scrollEl = document.scrollingElement || document.documentElement;
  if (y < margin) scrollEl.scrollTop -= 8;
  else if (y > window.innerHeight - margin) scrollEl.scrollTop += 8;
}

function onTouchDragEnd(e) {
  if (dragIdx === null || !dragCard) return;
  const y = e.changedTouches[0].clientY;
  const target = getDropTarget(y);

  // Clean up styles
  dragCard.style.transform = "";
  dragCard.style.position = "";
  dragCard.style.zIndex = "";
  dragCard.style.opacity = "";
  clearDragHighlights();
  document.body.style.overflow = "";

  if (target) {
    let toIdx = target.idx;
    if (target.pos === "below") toIdx++;
    if (toIdx > dragIdx) toIdx--;
    if (toIdx !== dragIdx) {
      const moved = exercises.splice(dragIdx, 1)[0];
      exercises.splice(toIdx, 0, moved);
      saveState();
    }
  }
  dragIdx = null;
  dragCard = null;
  render();
}

// ── WAKE LOCK ──
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// Re-acquire wake lock if page becomes visible again (e.g. after tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.view === 'timer' && state.phase !== 'idle') {
    requestWakeLock();
  }
});

// ── ADD/EDIT EXERCISE MODAL ──
let modalOpen = false;
let editIdx = null;  // null = adding, number = editing that index

function openAddModal() {
  editIdx = null;
  modalOpen = true;
  render();
}

function openEditModal(i) {
  editIdx = i;
  modalOpen = true;
  render();
  // Pre-populate fields after render
  const ex = exercises[i];
  document.getElementById("add-name").value = ex.name;
  // Parse weight: split number from unit
  const weightMatch = ex.weight.match(/^(\d+\.?\d*)\s*(kg|lbs)$/i);
  if (ex.weight === "BW") {
    document.getElementById("add-unit").value = "BW";
    document.getElementById("add-weight").value = "";
    document.getElementById("weight-num-field").style.display = "none";
  } else if (weightMatch) {
    document.getElementById("add-weight").value = weightMatch[1];
    document.getElementById("add-unit").value = weightMatch[2].toLowerCase();
    document.getElementById("weight-num-field").style.display = "";
  } else {
    document.getElementById("add-weight").value = ex.weight;
    document.getElementById("add-unit").value = "kg";
    document.getElementById("weight-num-field").style.display = "";
  }
  document.getElementById("add-sets").value = ex.sets;
  document.getElementById("add-reps").value = ex.reps;
  document.getElementById("add-work").value = ex.work;
  document.getElementById("add-rest").value = ex.rest;
  document.getElementById("add-linked").checked = ex.linkedToNext || false;
  document.getElementById("add-notes").value = ex.notes || "";
}

function closeModal() {
  modalOpen = false;
  editIdx = null;
  render();
}

// ── BORDER TIMER HELPER ──
function renderBorderTimer(phase, time) {
  const ex = exercises[state.exIdx];
  if (!ex) return "";
  const inSS = state.ssGroup.length > 1;
  const restTotal = inSS ? ssActiveRest() : ex.rest;
  const total = phase === "work" ? ex.work : phase === "rest" ? restTotal : (phase === "countdown" || phase === "buffer") ? 5 : 0;
  const pct = total > 0 ? time / total : 0;
  const baseColors = { work: "#ff6a4a", rest: "#4ac4c4", done: "#4aff7a", paused: "#ffaa00", countdown: "#ffaa00", buffer: "#ffaa00" };
  let strokeColor = baseColors[phase] || "#888";
  if (phase === "work" && inSS) {
    const gPos = state.ssGroup.indexOf(state.exIdx);
    if (gPos >= 0) strokeColor = ssExColor(gPos);
  }
  // Rectangle perimeter path — inset by half stroke width
  const sw = 14;
  const m = sw / 2;
  // SVG path goes counter-clockwise so the visible drain appears clockwise
  const w = 1000;
  const h = 1000;
  const path = `M ${w/2} ${m} L ${m} ${m} L ${m} ${h-m} L ${w-m} ${h-m} L ${w-m} ${m} Z`;
  const perim = 2 * (w - sw) + 2 * (h - sw);
  const offset = perim * (1 - pct);
  return `
    <div class="border-timer">
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <path class="border-track" d="${path}" stroke-width="${sw}" />
        <path class="border-fill" d="${path}" stroke-width="${sw}"
          stroke="${strokeColor}" stroke-dasharray="${perim}" stroke-dashoffset="${offset}" />
      </svg>
    </div>`;
}

// ── RENDER ──
function render() {
  const app = document.getElementById("app");

  if (state.view === "list") {
    const mainExercises = exercises.filter(e => !e.optional);
    const optionalExercises = exercises.filter(e => e.optional);
    const doneCount = mainExercises.filter(e => e.done).length;
    const pct = mainExercises.length ? (doneCount / mainExercises.length * 100) : 0;

    const renderCard = (e, i) => {
      const globalIdx = exercises.indexOf(e);
      const group = getSupersetGroup(globalIdx);
      const inSS = group.length > 1;
      const posInGroup = group.indexOf(globalIdx);
      let ssCls = "";
      if (inSS) {
        if (posInGroup === 0) ssCls = "ss-top";
        else if (posInGroup === group.length - 1) ssCls = "ss-bot";
        else ssCls = "ss-mid";
      }
      // Show "Superset" label before the first card in a group
      const ssLabel = inSS && posInGroup === 0 ? `<div class="ss-label">Superset (${group.length} exercises)</div>` : "";
      // Only show Start on first exercise in superset
      const showStart = !inSS || posInGroup === 0;
      return `${ssLabel}
        <div class="exercise-card ${e.done ? 'done' : ''} ${e.optional ? 'optional' : ''} ${ssCls}"
          data-idx="${globalIdx}"
          ondragover="onDragOver(event,${globalIdx})" ondrop="onDrop(event,${globalIdx})">
          <span class="drag-handle" draggable="true"
            ondragstart="onDragStart(event,${globalIdx})" ondragend="onDragEnd(event)"
            ontouchstart="onTouchDragStart(event,${globalIdx})"
            ontouchmove="onTouchDragMove(event)"
            ontouchend="onTouchDragEnd(event)">☰</span>
          <div class="tick-box ${e.done ? 'checked' : ''}" onclick="toggleDone(${globalIdx})">${e.done ? '✓' : ''}</div>
          <div class="exercise-info">
            <div class="exercise-name">${e.name}${e.optional ? '<span class="optional-tag">potential backfill</span>' : ''}</div>
            <div class="exercise-detail">${e.weight} &times; ${e.sets} sets &times; ${e.reps} reps &middot; ${e.work}s work / ${e.rest}s rest &middot; ${fmtTime(estTime(e))}</div>
            ${e.notes ? `<div class="exercise-detail" style="color:#666;font-style:italic;margin-top:2px">${e.notes}</div>` : ''}
          </div>
          ${showStart ? `<button class="btn-start" onclick="startExercise(${globalIdx})">${e.done ? 'Redo' : 'Start'}</button>` : ''}
          <button class="btn-remove" onclick="openEditModal(${globalIdx})">✎</button>
          <button class="btn-remove" onclick="removeExercise(${globalIdx})">&times;</button>
        </div>
      `;
    };

    const savedAt = localStorage.getItem(saveKey) ? JSON.parse(localStorage.getItem(saveKey)).savedAt : null;
    const savedLabel = savedAt ? "Saved " + new Date(savedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Not saved yet";

    // Format metadata for display
    let schedLabel = "";
    const metaParts = [];
    if (workoutMeta.athlete) metaParts.push(workoutMeta.athlete);
    if (workoutMeta.ref) metaParts.push(`ref:${workoutMeta.ref}`);
    if (metaParts.length) schedLabel = metaParts.join(" \u00b7 ");

    app.innerHTML = `
      <div class="list-view">
        <div class="header-row">
          <div>
            <h1>Workout Timer</h1>
            ${schedLabel ? `<div class="sub" style="margin-bottom:2px">${schedLabel}</div>` : ""}
            <div class="sub">${doneCount} / ${mainExercises.length} exercises complete &middot; ${fmtTime(estWorkoutTime())} remaining</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>

        ${exercises.map(renderCard).join("")}

        <button class="btn-open-add" onclick="openAddModal()">＋ Add Exercise</button>

        ${modalOpen ? `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <h3>${editIdx !== null ? 'Edit Exercise' : 'Add Exercise'}</h3>
            <div class="modal-field">
              <label>Name</label>
              <input id="add-name" placeholder="e.g. Swing Double-Hand">
            </div>
            <div class="weight-group">
              <div class="modal-field" id="weight-num-field">
                <label>Weight</label>
                <input id="add-weight" type="number" placeholder="e.g. 16" min="0.1" step="any">
              </div>
              <div class="modal-field">
                <label>Unit</label>
                <select id="add-unit" onchange="document.getElementById('weight-num-field').style.display=this.value==='BW'?'none':''">
                  <option value="kg" selected>kg</option>
                  <option value="lbs">lbs</option>
                  <option value="BW">BW</option>
                </select>
              </div>
            </div>
            <div class="modal-row">
              <div class="modal-field">
                <label>Sets</label>
                <input id="add-sets" type="number" value="5" min="1" max="20">
              </div>
              <div class="modal-field">
                <label>Reps</label>
                <input id="add-reps" type="number" value="10">
              </div>
            </div>
            <div class="modal-row">
              <div class="modal-field">
                <label>Work (s)</label>
                <input id="add-work" type="number" value="30" min="1">
              </div>
              <div class="modal-field">
                <label>Rest (s)</label>
                <input id="add-rest" type="number" value="0" min="0">
              </div>
            </div>
            <div class="modal-field" style="margin-top:10px">
              <label>Notes</label>
              <input id="add-notes" type="text" placeholder="e.g. slow eccentric, pause at bottom" style="width:100%">
            </div>
            <div class="modal-field" style="margin-top:10px">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#4a6aff">
                <input id="add-linked" type="checkbox" style="width:20px;height:20px;accent-color:#4a6aff">
                Superset with next exercise
              </label>
            </div>
            <div class="modal-buttons">
              <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
              <button class="btn-modal-add" onclick="saveExercise()">${editIdx !== null ? 'Save' : 'Add'}</button>
            </div>
          </div>
        </div>
        ` : ""}

        <div class="save-bar">
          <div class="status">${savedLabel}</div>
          <button id="export-btn" onclick="exportResults()">Export</button>
          <button onclick="sendToShortcut()">Send Timer Info On</button>
          <button onclick="clearSavedState()">Reset All</button>
        </div>
      </div>
    `;

  } else {
    const ex = exercises[state.exIdx];
    const inSS = state.ssGroup.length > 1;
    const gPos = inSS ? state.ssGroup.indexOf(state.exIdx) : -1;
    // For work & countdown in supersets, use exercise color; otherwise use default phase color
    const phaseColors = { work: "#ff6a4a", rest: "#4ac4c4", done: "#4aff7a", paused: "#ffaa00", countdown: "#ffaa00", buffer: "#ffaa00" };
    let textColor = phaseColors[state.phase] || "#888";
    if (inSS && state.phase === "work" && gPos >= 0) {
      textColor = ssExColor(gPos);
    }
    const colorStyle = `color:${textColor}`;
    const bgClass = "bg-" + state.phase;
    const labels = { work: "Work", rest: "Rest", done: "Complete", paused: "Paused", countdown: "Get Ready", buffer: "Next Up" };
    const display = state.phase === "done" ? "✓" : (state.phase === "countdown" || state.phase === "buffer") ? state.time : fmtTime(state.time);
    const remaining = totalRemaining();

    let controls = "";
    if (state.phase === "countdown") {
      controls = `<button class="btn-skip" onclick="skip()">Skip Countdown</button>`;
    } else if (state.phase === "paused") {
      controls = `<button class="btn-resume" onclick="resume()">Resume</button><button class="btn-skip" onclick="skip()">Skip →</button>`;
    } else if (state.phase === "done") {
      controls = `<button class="btn-done-btn" onclick="backToList()">Back to Exercises</button>`;
    } else {
      controls = `<button class="btn-pause" onclick="pause()">Pause</button><button class="btn-skip" onclick="skip()">Skip →</button>`;
    }

    const group = state.ssGroup;

    let meta = "";
    if (state.phase === "countdown") {
      meta = `<span style="color:#999">Starting in ${state.time}...</span>`;
    } else if (state.phase !== "done") {
      if (inSS) {
        meta = `<span>Round <span class="set-num">${state.ssRound}</span></span><span style="color:#444">|</span><span>${fmtTime(Math.max(0, remaining))} left</span>`;
      } else {
        meta = `<span>Set <span class="set-num">${state.set}</span> / ${ex.sets}</span><span style="color:#444">|</span><span>${fmtTime(Math.max(0, remaining))} left</span>`;
      }
    }

    // Superset breadcrumb: coloured per exercise, bright when active, dark when not
    let ssBreadcrumb = "";
    if (inSS && state.phase !== "countdown") {
      const items = state.ssActive.map((idx) => {
        const gPos = state.ssGroup.indexOf(idx);
        const exColor = ssExColor(gPos);
        const isActive = idx === state.exIdx && state.phase === "work";
        const posInActive = state.ssActive.indexOf(idx);
        const alreadyWorked = state.phase === "work" && posInActive < state.ssPos;
        const setsLeft = state.ssSetsLeft[idx] || 0;
        const total = exercises[idx].sets;
        let done = total - setsLeft;
        if (alreadyWorked) done++;
        const setNum = Math.min(done + 1, total);
        // Bright color when active, darker (40% opacity) when not
        const color = isActive ? exColor : exColor + "66";
        const weight = isActive ? "700" : "400";
        return `<span style="color:${color};font-weight:${weight}">${exercises[idx].name} <small style="opacity:0.7">${setNum}/${total}</small></span>`;
      });
      // Add Rest item
      const restColor = state.phase === "rest" ? "#4ac4c4" : "#4ac4c466";
      const restWeight = state.phase === "rest" ? "700" : "400";
      if (state.phase !== "done") {
        items.push(`<span style="color:${restColor};font-weight:${restWeight}">Rest</span>`);
      }
      // Flat list with arrows between all items; CSS handles wrapping
      let bcHtml = "";
      for (let i = 0; i < items.length; i++) {
        if (i > 0) bcHtml += '<span class="ss-arrow">→</span>';
        bcHtml += items[i];
      }
      ssBreadcrumb = `<div class="ss-breadcrumb">${bcHtml}</div>`;
    }

    // Progress pills: for solo = sets, for superset = per-exercise set pills
    let progressHtml = "";
    if (state.phase !== "countdown") {
      if (inSS) {
        // No progress section for supersets — breadcrumbs handle it
        progressHtml = "";
      } else {
        progressHtml = `<div class="timer-progress">${Array.from({length: ex.sets}, (_, i) => {
          let cls = "";
          if (state.phase === "done") { cls = "done"; }
          else if (state.phase === "rest" || state.phase === "paused") {
            if (i < state.set) { cls = "done"; }
            else if (i === state.set) { cls = "active-rest"; }
          } else {
            if (i < state.set - 1) { cls = "done"; }
            else if (i === state.set - 1) { cls = "active-" + state.phase; }
          }
          return `<div class="set-block ${cls}"></div>`;
        }).join("")}</div>`;
      }
    }

    const canTap = ["work", "rest", "buffer", "paused"].includes(state.phase);
    const tapHint = state.phase === "paused" ? "Tap anywhere to resume" :
                    canTap ? "Tap anywhere to pause" : "";

    app.innerHTML = `
      <div class="timer-view" onclick="onTimerTap(event)">
        <button class="btn-back" onclick="backToList()">← Back</button>
        ${tapHint ? '<div class="tap-hint">' + tapHint + '</div>' : ''}
        <div class="timer-left">
          <div class="timer-exercise-name">${inSS && state.phase === "rest" ? "Rest" : ex.name}</div>
          <div class="timer-exercise-detail">${inSS && state.phase === "rest" ? "&nbsp;" : ex.weight + " &times; " + ex.reps + " reps"}</div>
          ${ex.notes && (state.phase === "work" || state.phase === "buffer") ? '<div style="font-size:clamp(14px,3vw,28px);color:#888;font-style:italic;margin-bottom:12px;text-align:center">' + ex.notes + '</div>' : ''}
          <div class="timer-meta">${meta}</div>
          ${progressHtml}
        </div>
        <div class="timer-right">
          <div class="timer-clock" style="${colorStyle}">${display}</div>
          <div class="timer-phase" style="${colorStyle}">${labels[state.phase] || ""}</div>
          <div class="timer-controls">${controls}</div>
        </div>
        ${ssBreadcrumb}
      </div>
      ${renderBorderTimer(state.phase, state.time)}
    `;
  }
}

// ── INIT ──
loadExercises();
</script>
</body>
</html>
